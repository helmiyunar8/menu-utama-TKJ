<script>

async function loadRanking(){

var url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSqs-8lunzd77k36faD8j7x91EBYMbSRFViD5gB04kGdSmi4DCKPikzC4QqhotF2QjDkbmZm7i-R3OJ/pub?gid=1337124987&single=true&output=csv";

var res = await fetch(url);
var text = await res.text();

var rows = text.trim().split("\n").slice(1); // buang header

var data = rows.map(r=>{
var c = r.split(",");
return {
nama: c[0],
kelas: c[1],
nilai: parseInt(c[2]) || 0
};
});

// urutkan dari nilai tertinggi
data.sort((a,b)=>b.nilai - a.nilai);

var html="";

for(var i=0;i<data.length;i++){
html += "<tr>";
html += "<td>"+(i+1)+"</td>";
html += "<td>"+data[i].nama+"</td>";
html += "<td>"+data[i].nilai+"</td>";
html += "</tr>";
}

document.getElementById("ranking").innerHTML = html;

}

</script>
